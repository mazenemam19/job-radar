name: Remote Cron Trigger

on:
  schedule:
    - cron: "0 9 * * *" # Every day at 09:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  ping-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Job Radar Cron
        run: |
          curl -X POST "https://job-radar-lyart.vercel.app/api/cron" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -f
