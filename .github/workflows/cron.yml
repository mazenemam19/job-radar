# .github/workflows/cron.yml
# Triggers the daily ATS scrape via the /api/cron endpoint.

name: Cron – Scrape ATS companies

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC
    - cron: '0 16 * * *'  # 16:00 UTC
  workflow_dispatch:  # Allow manual triggers

jobs:
  trigger-cron:
    name: Trigger /api/cron
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger cron endpoint
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.VERCEL_PRODUCTION_URL }}/api/cron")

          echo "Response status: $RESPONSE"

          if [ "$RESPONSE" != "200" ]; then
            echo "Cron endpoint returned $RESPONSE — failing workflow"
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        run: echo "Job Radar cron failed. Check Vercel logs for details."
