# .github/workflows/cron-v2.yml
# New cron workflow for Job Radar v2.
# The existing .github/workflows/cron.yml is untouched — this runs alongside it.

name: Cron v2 – Scrape ATS companies

on:
  schedule:
    # Runs at 09:00 UTC daily (complement to existing 16:00 UTC cron)
    - cron: '0 9 * * *'
  workflow_dispatch:  # Allow manual triggers

jobs:
  trigger-cron-v2:
    name: Trigger /api/cron
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger cron endpoint
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.VERCEL_PRODUCTION_URL }}/api/cron")

          echo "Response status: $RESPONSE"

          if [ "$RESPONSE" != "200" ]; then
            echo "Cron endpoint returned $RESPONSE — failing workflow"
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        run: echo "Job Radar v2 cron failed. Check Vercel logs for details."
